<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅立ち</title>
<style>
* { box-sizing: border-box; }
body {
margin: 0; min-height: 100vh; font-family: system-ui, sans-serif;
background: radial-gradient(circle at top, #fff4c7 0%, #ffd88a 45%, #ff9f5a 100%);
display: flex; justify-content: center; align-items: center; padding: 14px; overflow: hidden;
}
.app {
width: 100%; max-width: 390px; min-height: 92vh; background: #fffaf0;
border: 5px solid #2b1b10; border-radius: 30px; box-shadow: 0 9px 0 #2b1b10;
padding: 18px; text-align: center; position: relative; overflow: hidden;
display: flex; flex-direction: column;
}
.title {
background: #ff7a00; color: white; border: 4px solid #2b1b10; border-radius: 20px;
padding: 10px; font-size: 22px; font-weight: 900; box-shadow: 0 5px 0 #2b1b10; z-index: 5;
}
.stage {
flex: 1; margin-top: 14px; background: linear-gradient(#bfe9ff 0%, #eafff1 60%, #9bdc75 60%, #5fbd4a 100%);
border: 4px solid #2b1b10; border-radius: 26px; position: relative; overflow: hidden;
transition: background 1.5s; display: flex; align-items: center; justify-content: center;
}
.stage.sunset { background: linear-gradient(#ff9a52 0%, # ff6b6b 40%, #6a4a8c 75%, #2b1b40 100%); }
.stage.night { background: linear-gradient(#0b1140 0%, #1a2a6c 60%, #2b1b40 100%); }

/* モンスター */
.monster {
position: absolute; left: 50%; bottom: 64px; width: 110px; height: 110px;
transform: translateX(-50%); transition: all 3.2s ease-in; z-index: 4;
}
.monster.walk { left: 128%; bottom: 150px; transform: translateX(-50%) scale(0.2); opacity: 0; }
.monkey { position: relative; width: 110px; height: 110px; }
.head { position: absolute; top: 8px; left: 28px; width: 56px; height: 50px; background: #e94b35; border: 5px solid #2b1b10; border-radius: 50% 50% 44% 44%; }
.ear-left, .ear-right { position: absolute; top: 3px; width: 24px; height: 24px; background: #e94b35; border: 5px solid #2b1b10; border-radius: 50%; }
.ear-left { left: 16px; } .ear-right { right: 16px; }
.body { position: absolute; top: 58px; left: 34px; width: 44px; height: 42px; background: #ff8a3d; border: 5px solid #2b1b10; border-radius: 18px; }
.eye { position: absolute; top: 22px; width: 7px; height: 7px; background: #2b1b10; border-radius: 50%; }
.eye.left { left: 18px; } .eye.right { right: 18px; }
.tail { position: absolute; right: 6px; top: 62px; width: 34px; height: 24px; border: 6px solid #2b1b10; border-left: none; border-bottom: none; border-radius: 0 999px 0 0; transform: rotate(15deg); }

.panel { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 6; }
.panel.show { display: flex; }
.memory-title { font-size: 22px; font-weight: 900; color: #2b1b10; margin-bottom: 16px; }
.memory-row { background: rgba(255,255,255,0.92); border: 3px solid #2b1b10; border-radius: 14px; padding: 8px 16px; margin: 6px 0; font-size: 16px; font-weight: 900; color: #2b1b10; }
.thanks { font-size: 26px; font-weight: 900; color: #ff4b35; margin-top: 16px; }
.big-msg { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 2px 6px #000; line-height: 1.5; }

.album { background: #fff1cf; border: 4px solid #2b1b10; border-radius: 18px; padding: 16px; box-shadow: 0 5px 0 #2b1b10; width: 86%; }
.album h3 { margin: 0 0 12px; font-size: 18px; color: #2b1b10; }
.album .mon-mini { width: 70px; height: 70px; margin: 0 auto 8px; position: relative; }
.album-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; color: #2b1b10; padding: 4px 0; border-bottom: 2px dotted #2b1b10; }

.eggs { display: flex; gap: 14px; justify-content: center; }
.egg { width: 72px; height: 92px; border: 4px solid #2b1b10; border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%; cursor: pointer; box-shadow: 0 5px 0 #2b1b10; position: relative; transition: transform 0.2s; }
.egg:active { transform: translateY(4px); }
.egg.red { background: radial-gradient(circle at 35% 30%, #ff9a8a, #e94b35); }
.egg.blue { background: radial-gradient(circle at 35% 30%, #9fd0ff, #2f8ee5); }
.egg.pink { background: radial-gradient(circle at 35% 30%, #ffc0e0, #ff6fb1); }
.egg::after { content: ""; position: absolute; left: 18%; top: 30%; width: 22%; height: 14%; background: rgba(255,255,255,0.6); border-radius: 50%; }

.spark { position: absolute; width: 12px; height: 12px; background: #fff36a; border: 3px solid #ff8c00; border-radius: 50%; z-index: 9; animation: spark 0.9s ease-out forwards; }
@keyframes spark { from { opacity:1; transform: translate(0,0) scale(1); } to { opacity:0; transform: translate(var(--x), var(--y)) scale(2.4); } }

.action {
width: 100%; height: 66px; border: 5px solid #2b1b10; border-radius: 22px;
background: #ff7a00; color: white; font-size: 22px; font-weight: 900;
box-shadow: 0 7px 0 #2b1b10; margin-top: 14px; z-index: 7;
}
.action:active { transform: translateY(4px); box-shadow: 0 3px 0 #2b1b10; }
.action.green { background: #34b85a; }
.notice { color: #ff4b35; font-weight: 900; font-size: 16px; margin-top: 8px; z-index:7; }
</style>
</head>
<body>
<div class="app" id="app">
<div class="title">旅立ち</div>

<div class="stage" id="stage">
<div class="monster" id="monster">
<div class="monkey">
<div class="ear-left"></div>
<div class="ear-right"></div>
<div class="head"><div class="eye left"></div><div class="eye right"></div></div>
<div class="body"></div>
<div class="tail"></div>
</div>
</div>

<!-- ① 思い出 -->
<div class="panel" id="p1">
<div class="memory-title">モンキーは<br>92日間 一緒に過ごした！</div>
<div class="memory-row">バトル勝利数　23回</div>
<div class="memory-row">戦闘力　182</div>
<div class="thanks">ありがとう！</div>
</div>

<!-- ③ 図鑑登録 -->
<div class="panel" id="p3">
<div class="big-msg">モンキーは旅立った！<br>図鑑に登録された！</div>
</div>

<!-- ④ アルバム -->
<div class="panel" id="p4">
<div class="album">
<h3>歴代パートナー</h3>
<div class="mon-mini">
<div class="monkey" style="transform:scale(0.62)">
<div class="ear-left"></div><div class="ear-right"></div>
<div class="head"><div class="eye left"></div><div class="eye right"></div></div>
<div class="body"></div><div class="tail"></div>
</div>
</div>
<div class="album-row"><span>名前</span><span>モンキー</span></div>
<div class="album-row"><span>育成日数</span><span>92日</span></div>
<div class="album-row"><span>戦闘力</span><span>182</span></div>
<div class="album-row" style="border:none"><span>バトル勝率</span><span>23勝 ・ 68%</span></div>
</div>
</div>

<!-- ⑤ 新しい卵 -->
<div class="panel" id="p5">
<div class="memory-title">新しい冒険が始まる！</div>
<div class="notice" style="margin-bottom:14px">育てたい卵を選ぼう</div>
<div class="eggs">
<div class="egg red" data-egg="赤い卵（サル系）"></div>
<div class="egg blue" data-egg="青い卵（イヌ系）"></div>
<div class="egg pink" data-egg="ピンクの卵（トリ系）"></div>
</div>
</div>
</div>

<div class="notice" id="notice">！ 旅立ちの時が来た…</div>
<button class="action" id="actionBtn">旅立ちを見送る</button>
</div>

<script>
const app = document.getElementById("app");
const stage = document.getElementById("stage");
const monster = document.getElementById("monster");
const actionBtn = document.getElementById("actionBtn");
const notice = document.getElementById("notice");
const panels = { 1:document.getElementById("p1"), 3:document.getElementById("p3"), 4:document.getElementById("p4"), 5:document.getElementById("p5") };

function hideAllPanels(){ Object.values(panels).forEach(p=>p.classList.remove("show")); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function sparkle(){
for(let i=0;i<16;i++){
const s=document.createElement("div");
s.className="spark";
const ang=Math.random()*Math.PI*2, d=80+Math.random()*120;
s.style.left="50%"; s.style.top="45%";
s.style.setProperty("--x", Math.cos(ang)*d+"px");
s.style.setProperty("--y", Math.sin(ang)*d+"px");
app.appendChild(s);
setTimeout(()=>s.remove(),950);
}
}

let step = 0;
actionBtn.addEventListener("click", run);

async function run(){
step++;
if(step===1){
// ① 思い出
notice.style.display="none";
panels[1].classList.add("show");
actionBtn.textContent="見送る →";
}else if(step===2){
// ② 歩き出す
hideAllPanels();
actionBtn.style.display="none";
stage.classList.add("sunset");
await wait(600);
monster.classList.add("walk");
await wait(2600);
stage.classList.remove("sunset");
stage.classList.add("night");
await wait(800);
// ③ 図鑑登録
panels[3].classList.add("show");
sparkle();
actionBtn.style.display="block";
actionBtn.textContent="次へ →";
}else if(step===3){
// ④ アルバム
hideAllPanels();
stage.classList.remove("night");
panels[4].classList.add("show");
actionBtn.textContent="新しい卵へ →";
}else if(step===4){
// ⑤ 新しい卵
hideAllPanels();
panels[5].classList.add("show");
actionBtn.style.display="none";
document.querySelectorAll(".egg").forEach(egg=>{
egg.addEventListener("click",()=>{
sparkle();
notice.style.display="block";
notice.textContent = egg.dataset.egg + " を選んだ！新しい冒険スタート！";
actionBtn.style.display="block";
actionBtn.className="action green";
actionBtn.textContent="ホームへ戻る";
step=5;
});
});
}else if(step===5){
location.href="index.html";
}
}
</script>
</body>
</html>
