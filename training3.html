<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>トレーニング③ 連打ゲーム</title>
<style>
body { font-family: sans-serif; background: #f7f7f7; text-align: center; padding: 24px; }
.topbar { max-width: 420px; margin: 0 auto 16px; text-align: left; }
.back {
background: white; color: #2b1b10; border: 3px solid #2b1b10;
border-radius: 999px; padding: 8px 14px; font-size: 14px; font-weight: 900; cursor: pointer;
}
.game {
max-width: 420px; margin: auto; background: white; border-radius: 20px;
padding: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}
h1 { font-size: 22px; margin-bottom: 8px; }
.timer { font-size: 30px; font-weight: 900; color: #2b1b10; margin: 10px 0; }
.taps { font-size: 46px; font-weight: 900; color: #34b85a; margin: 6px 0; }
.bar { height: 18px; border: 3px solid #333; border-radius: 999px; overflow: hidden; background: #f0f0f0; margin: 12px 0; }
.fill { height: 100%; width: 0%; background: #34b85a; transition: width 0.1s; }
button.tap {
width: 100%; padding: 22px; border: none; border-radius: 14px;
background: #34b85a; color: white; font-size: 24px; font-weight: bold; margin-top: 8px;
}
button.tap:active { transform: scale(0.97); }
button.tap:disabled { background: #999; }
.result { margin-top: 20px; font-size: 22px; font-weight: bold; }
.small { font-size: 14px; color: #666; margin-top: 12px; }
</style>
</head>
<body>

<div class="topbar">
<button class="back" onclick="location.href='training.html'">← もどる</button>
</div>

<div class="game">
<h1>トレーニング③</h1>
<p>10秒で20回以上タップしてクリア！</p>

<div class="timer" id="timer">のこり 10.0 秒</div>
<div class="taps" id="taps">0</div>
<div class="bar"><div class="fill" id="fill"></div></div>

<button class="tap" id="tapButton">タップ！</button>

<div class="result" id="result">スタートボタン代わりに、まずはタップ！</div>
<div class="small">20回以上でクリア＝パラメーターが成長します</div>
</div>

<script>
const timerEl = document.getElementById("timer");
const tapsEl = document.getElementById("taps");
const fillEl = document.getElementById("fill");
const tapButton = document.getElementById("tapButton");
const result = document.getElementById("result");

const GOAL = 20;
const TIME_LIMIT = 10.0;

let taps = 0;
let started = false;
let finished = false;
let endTime = 0;

function tick() {
if (!started || finished) return;
const remaining = Math.max(0, (endTime - Date.now()) / 1000);
timerEl.textContent = "のこり " + remaining.toFixed(1) + " 秒";
if (remaining <= 0) {
finish();
return;
}
requestAnimationFrame(tick);
}

function finish() {
finished = true;
tapButton.disabled = true;
if (taps >= GOAL) {
result.textContent = "クリア！能力アップ！（" + taps + "回）";
result.style.color = "#34b85a";
} else {
result.textContent = "あと" + (GOAL - taps) + "回たりなかった…もう一回！";
result.style.color = "#e53935";
}
console.log("トレーニング③：タップ数 " + taps);
}

tapButton.addEventListener("click", () => {
if (finished) return;
if (!started) {
started = true;
endTime = Date.now() + TIME_LIMIT * 1000;
result.textContent = "連打連打！";
result.style.color = "#2b1b10";
requestAnimationFrame(tick);
}
taps++;
tapsEl.textContent = taps;
fillEl.style.width = Math.min(100, (taps / GOAL) * 100) + "%";
});
</script>

</body>
</html>
