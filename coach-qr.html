<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>指導者用 QR発行</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
margin: 0; min-height: 100vh; font-family: system-ui, sans-serif;
background: radial-gradient(circle at top, #d9e8ff 0%, #9fb8e0 60%, #5a72a0 100%);
display: flex; justify-content: center; align-items: flex-start; padding: 14px;
}
.app {
width: 100%; max-width: 390px; min-height: 92vh; background: #fffaf0;
border: 5px solid #2b1b10; border-radius: 30px; box-shadow: 0 9px 0 #2b1b10;
overflow: hidden; display: flex; flex-direction: column;
}
.header { background: #2b3a67; color: white; border-bottom: 5px solid #2b1b10; padding: 14px; font-weight: 900; font-size: 18px; text-align: center; }
.tag { font-size: 11px; opacity: 0.8; }
.content { flex: 1; padding: 16px; overflow-y: auto; }
label { display: block; font-size: 14px; font-weight: 900; color: #2b1b10; margin: 12px 0 6px; }
select {
width: 100%; padding: 12px; border: 3px solid #2b1b10; border-radius: 12px; font-size: 16px; font-weight: 800; background: white;
}
.gen-btn {
width: 100%; margin-top: 18px; padding: 14px; border: 4px solid #2b1b10; border-radius: 16px;
background: #ff7a00; color: white; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #2b1b10;
}
.gen-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2b1b10; }
.qr-box { margin-top: 18px; text-align: center; display: none; }
.qr-box.show { display: block; }
.qr-card { display: inline-block; background: white; border: 4px solid #2b1b10; border-radius: 18px; padding: 16px; box-shadow: 0 5px 0 #2b1b10; }
#qr { display: flex; justify-content: center; }
.qr-label { margin-top: 10px; font-size: 15px; font-weight: 900; color: #2b1b10; }
.qr-code-text { margin-top: 6px; font-size: 12px; color: #666; word-break: break-all; }
.note { margin-top: 16px; font-size: 12px; color: #5a3218; font-weight: 700; line-height: 1.5; background: #fff3c4; border: 3px solid #2b1b10; border-radius: 12px; padding: 10px; }
</style>
</head>
<body>
<div class="app">
<div class="header">
指導者用 QR発行<br>
<span class="tag">※この画面は通常アプリからは開けません（別URL）</span>
</div>
<div class="content">
<label>今日の教室</label>
<select id="classroom">
<option value="allround|5|体操教室">体操教室（万能の種 +5）</option>
<option value="power|3|バスケ">バスケ（パワーの種 +3）</option>
<option value="speed|3|バドミントン">バドミントン（スピードの種 +3）</option>
<option value="technique|3|卓球">卓球（テクニックの種 +3）</option>
<option value="stamina|3|バレー">バレー（スタミナの種 +5）</option>
</select>

<button class="gen-btn" id="genBtn">参加者に見せるQRを発行</button>

<div class="qr-box" id="qrBox">
<div class="qr-card">
<div id="qr"></div>
<div class="qr-label" id="qrLabel"></div>
<div class="qr-code-text" id="qrText"></div>
</div>
</div>

<div class="note">参加者はホームの「QR」からこのコードを読み取ると、種を獲得できます。本番では発行日時・対象教室の管理や有効期限を本部管理画面で制御します。</div>
</div>
</div>

<script>
const SEEDNAME = { power:"パワーの種", stamina:"スタミナの種", speed:"スピードの種", technique:"テクニックの種", allround:"万能の種", rainbow:"虹の種" };
let qrObj = null;

document.getElementById("genBtn").addEventListener("click", () => {
const [seed, amount, room] = document.getElementById("classroom").value.split("|");
const today = new Date().toISOString().slice(0,10);
const code = `SOWERS:${seed}:${amount}:${today}`;

const qrDiv = document.getElementById("qr");
qrDiv.innerHTML = "";
qrObj = new QRCode(qrDiv, { text: code, width: 200, height: 200, colorDark:"#2b1b10", colorLight:"#ffffff" });

document.getElementById("qrLabel").textContent = `${room}：${SEEDNAME[seed]} +${amount}`;
document.getElementById("qrText").textContent = code;
document.getElementById("qrBox").classList.add("show");
});
</script>
</body>
</html>
